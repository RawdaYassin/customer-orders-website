<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Data Entry</title>
    <style>
        /* Simple and clean CSS for easy browser viewing */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #f0f2f5;
        }
        h1 { text-align: center; color: #1a5c8a; }
        section { 
            background: #ffffff; 
            padding: 25px; 
            margin-bottom: 30px; 
            border-radius: 10px; 
            border-left: 5px solid #1a5c8a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; }
        input[type="text"], input[type="email"], input[type="number"], input[type="date"], input[type="time"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        button {
            background-color: #1a5c8a;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #124061; }
    </style>
</head>
<body>

    <h1>Hospital Database Data Entry Portal</h1>

    <section>
        <h2>Patient Registration</h2>
        <form>
            <div class="form-group"><label>Patient Number (PatNo):</label><input type="number" required></div>
            <div class="form-group"><label>First Name:</label><input type="text" required></div>
            <div class="form-group"><label>Last Name:</label><input type="text" required></div>
            <div class="form-group"><label>Street:</label><input type="text"></div>
            <div class="form-group"><label>City:</label><input type="text"></div>
            <div class="form-group"><label>State:</label><input type="text"></div>
            <div class="form-group"><label>Zip Code:</label><input type="text"></div>
            <div class="form-group"><label>Email Address:</label><input type="email"></div>
            <button type="submit">Submit Patient Data</button>
        </form>
    </section>

    <section>
        <h2>Doctor Details</h2>
        <form>
            <div class="form-group"><label>Doctor Number (DocNo):</label><input type="number" required></div>
            <div class="form-group"><label>First Name:</label><input type="text" required></div>
            <div class="form-group"><label>Last Name:</label><input type="text" required></div>
            <div class="form-group"><label>Phone Number:</label><input type="text"></div>
            <div class="form-group"><label>Email Address:</label><input type="email"></div>
            <div class="form-group"><label>Specialization:</label><input type="text"></div>
            <div class="form-group"><label>Department:</label><input type="text"></div>
            <button type="submit">Submit Doctor Data</button>
        </form>
    </section>

    <section>
        <h2>Schedule New Appointment</h2>
        <form>
            <div class="form-group"><label>Appointment Number (AppNo):</label><input type="number" required></div>
            <div class="form-group"><label>Date:</label><input type="date" required></div>
            <div class="form-group"><label>Time:</label><input type="time" required></div>
            <div class="form-group"><label>Room Number:</label><input type="text"></div>
            <div class="form-group"><label>Status (e.g. Scheduled, Completed):</label><input type="text"></div>
            <div class="form-group"><label>Patient ID (PatNo):</label><input type="number" required></div>
            <div class="form-group"><label>Doctor ID (DocNo):</label><input type="number" required></div>
            <button type="submit">Submit Appointment</button>
        </form>
    </section>

    <section>
        <h2>Add Treatment Type</h2>
        <form>
            <div class="form-group"><label>Treatment Number (TreatNo):</label><input type="number" required></div>
            <div class="form-group"><label>Treatment Name:</label><input type="text" required></div>
            <div class="form-group"><label>Description:</label><textarea rows="3"></textarea></div>
            <div class="form-group"><label>Cost ($):</label><input type="number" step="0.01"></div>
            <div class="form-group"><label>Status:</label><input type="text"></div>
            <button type="submit">Submit Treatment Data</button>
        </form>
    </section>

    <section>
        <h2>Assign Treatment to Appointment (Link)</h2>
        <form>
            <div class="form-group"><label>Link ID (AppTreatNo):</label><input type="number" required></div>
            <div class="form-group"><label>Appointment ID (AppNo):</label><input type="number" required></div>
            <div class="form-group"><label>Treatment ID (TreatNo):</label><input type="number" required></div>
            <button type="submit">Link Treatment to Appointment</button>
        </form>
    </section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Database - Data Entry Forms</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #2c6e49;
      margin-bottom: 30px;
    }

    .form-section {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 20px 25px;
      margin-bottom: 25px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .form-section h2 {
      margin-top: 0;
      margin-bottom: 18px;
      color: #2c6e49;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.88rem;
      font-weight: bold;
      color: #444;
    }

    input, select, textarea {
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 0.9rem;
      box-sizing: border-box;
      width: 100%;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #2c6e49;
    }

    textarea { resize: vertical; }

    .submit-row {
      grid-column: 1 / -1;
      margin-top: 6px;
    }

    button[type="submit"] {
      background-color: #2c6e49;
      color: white;
      padding: 10px 28px;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background-color: #235c3c;
    }
  </style>
</head>
<body>

  <h1>Hospital Database - Data Entry Forms</h1>

  <!-- Treatment -->
  <div class="form-section">
    <h2>Treatment</h2>
    <form onsubmit="handleSubmit(event, 'Treatment')">
      <div class="form-grid">

        <div class="field">
          <label for="TreatNo">Treatment No</label>
          <input type="number" id="TreatNo" name="TreatNo" placeholder="e.g. 101" required />
        </div>

        <div class="field">
          <label for="TreatName">Treatment Name</label>
          <input type="text" id="TreatName" name="TreatName" placeholder="e.g. Physical Therapy" />
        </div>

        <div class="field">
          <label for="TreatCost">Treatment Cost ($)</label>
          <input type="number" id="TreatCost" name="TreatCost" placeholder="e.g. 250.00" step="0.01" min="0" />
        </div>

        <div class="field">
          <label for="TreatStatus">Treatment Status</label>
          <input type="text" id="TreatStatus" name="TreatStatus" placeholder="e.g. Active" />
        </div>

        <div class="field full-width">
          <label for="TreatDescription">Treatment Description</label>
          <textarea id="TreatDescription" name="TreatDescription" rows="3" placeholder="Describe the treatment..."></textarea>
        </div>

        <div class="submit-row">
          <button type="submit">Submit</button>
        </div>

      </div>
    </form>
  </div>

  <!-- Patient -->
  <div class="form-section">
    <h2>Patient</h2>
    <form onsubmit="handleSubmit(event, 'Patient')">
      <div class="form-grid">

        <div class="field">
          <label for="PatNo">Patient No</label>
          <input type="number" id="PatNo" name="PatNo" placeholder="e.g. 1001" required />
        </div>

        <div class="field">
          <label for="PatEmail">Email</label>
          <input type="email" id="PatEmail" name="PatEmail" placeholder="e.g. sarah@email.com" />
        </div>

        <div class="field">
          <label for="PatFirstName">First Name</label>
          <input type="text" id="PatFirstName" name="PatFirstName" placeholder="e.g. Sarah" />
        </div>

        <div class="field">
          <label for="PatLastName">Last Name</label>
          <input type="text" id="PatLastName" name="PatLastName" placeholder="e.g. Johnson" />
        </div>

        <div class="field full-width">
          <label for="PatStreet">Street</label>
          <input type="text" id="PatStreet" name="PatStreet" placeholder="e.g. 123 Main St" />
        </div>

        <div class="field">
          <label for="PatCity">City</label>
          <input type="text" id="PatCity" name="PatCity" placeholder="e.g. Cairo" />
        </div>

        <div class="field">
          <label for="PatState">State</label>
          <input type="text" id="PatState" name="PatState" placeholder="e.g. CA" />
        </div>

        <div class="field">
          <label for="PatZip">ZIP Code</label>
          <input type="text" id="PatZip" name="PatZip" placeholder="e.g. 90210" />
        </div>

        <div class="submit-row">
          <button type="submit">Submit</button>
        </div>

      </div>
    </form>
  </div>

  <!-- Doctor -->
  <div class="form-section">
    <h2>Doctor</h2>
    <form onsubmit="handleSubmit(event, 'Doctor')">
      <div class="form-grid">

        <div class="field">
          <label for="DocNo">Doctor No</label>
          <input type="number" id="DocNo" name="DocNo" placeholder="e.g. 201" required />
        </div>

        <div class="field">
          <label for="DocPhone">Phone</label>
          <input type="tel" id="DocPhone" name="DocPhone" placeholder="e.g. +1-555-0100" />
        </div>

        <div class="field">
          <label for="DocFirstName">First Name</label>
          <input type="text" id="DocFirstName" name="DocFirstName" placeholder="e.g. Ahmed" />
        </div>

        <div class="field">
          <label for="DocLastName">Last Name</label>
          <input type="text" id="DocLastName" name="DocLastName" placeholder="e.g. Hassan" />
        </div>

        <div class="field">
          <label for="DocEmail">Email</label>
          <input type="email" id="DocEmail" name="DocEmail" placeholder="e.g. dr.hassan@hospital.com" />
        </div>

        <div class="field">
          <label for="DocSpecialization">Specialization</label>
          <input type="text" id="DocSpecialization" name="DocSpecialization" placeholder="e.g. Cardiology" />
        </div>

        <div class="field">
          <label for="DocDepartment">Department</label>
          <input type="text" id="DocDepartment" name="DocDepartment" placeholder="e.g. Internal Medicine" />
        </div>

        <div class="submit-row">
          <button type="submit">Submit</button>
        </div>

      </div>
    </form>
  </div>

  <!-- Appointment -->
  <div class="form-section">
    <h2>Appointment</h2>
    <form onsubmit="handleSubmit(event, 'Appointment')">
      <div class="form-grid">

        <div class="field">
          <label for="AppNo">Appointment No</label>
          <input type="number" id="AppNo" name="AppNo" placeholder="e.g. 5001" required />
        </div>

        <div class="field">
          <label for="AppRoomNo">Room No</label>
          <input type="text" id="AppRoomNo" name="AppRoomNo" placeholder="e.g. B-204" />
        </div>

        <div class="field">
          <label for="AppDate">Date</label>
          <input type="date" id="AppDate" name="AppDate" />
        </div>

        <div class="field">
          <label for="AppTime">Time</label>
          <input type="time" id="AppTime" name="AppTime" />
        </div>

        <div class="field">
          <label for="AppStatus">Status</label>
          <input type="text" id="AppStatus" name="AppStatus" placeholder="e.g. Scheduled" />
        </div>

        <div class="field">
          <label for="App_PatNo">Patient No</label>
          <input type="number" id="App_PatNo" name="PatNo" placeholder="e.g. 1001" />
        </div>

        <div class="field">
          <label for="App_DocNo">Doctor No</label>
          <input type="number" id="App_DocNo" name="DocNo" placeholder="e.g. 201" />
        </div>

        <div class="submit-row">
          <button type="submit">Submit</button>
        </div>

      </div>
    </form>
  </div>

  <!-- Appointment Treatment -->
  <div class="form-section">
    <h2>Appointment Treatment</h2>
    <form onsubmit="handleSubmit(event, 'AppointmentTreatment')">
      <div class="form-grid">

        <div class="field">
          <label for="AppTreatNo">AppTreat No</label>
          <input type="number" id="AppTreatNo" name="AppTreatNo" placeholder="e.g. 9001" required />
        </div>

        <div class="field">
          <label for="AT_AppNo">Appointment No</label>
          <input type="number" id="AT_AppNo" name="AppNo" placeholder="e.g. 5001" />
        </div>

        <div class="field">
          <label for="AT_TreatNo">Treatment No</label>
          <input type="number" id="AT_TreatNo" name="TreatNo" placeholder="e.g. 101" />
        </div>

        <div class="submit-row">
          <button type="submit">Submit</button>
        </div>

      </div>
    </form>
  </div>

  <script>
    function handleSubmit(event, tableName) {
      event.preventDefault();
      alert(tableName + ' record submitted successfully!');
      event.target.reset();
    }
  </script>

</body>
</html>
